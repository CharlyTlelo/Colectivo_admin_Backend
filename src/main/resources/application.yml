spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/colectivo}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5s
  application:
    name: colectivo-admin

server:
  port: ${PORT:${SERVER_PORT:8081}}

colectivo:
  jwt:
    secret: ${JWT_SECRET:colectivo-admin-secret-key-2026-min-256-bits-here}
    expiration-ms: 86400000  # 24h
  admin:
    otp-ttl-minutes: 5
    otp-max-attempts: 3
  archive:
    directory: ${TRIP_ARCHIVE_DIR:./data/trip-archives}
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  data-seeder:
    enabled: ${COLECTIVO_DATA_SEEDER_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

logging:
  level:
    com.colectivo: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: ${MONGODB_URI}

colectivo:
  cors:
    allowed-origins: ${CORS_ORIGINS}
  data-seeder:
    enabled: false

logging:
  level:
    com.colectivo: INFO
